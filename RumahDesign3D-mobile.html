  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-open { transform: translateX(0); box-shadow: 14px 0 50px rgba(0,0,0,.55); }\n  .toolbar .tool-btn { width: 50px; height: 50px; font-size: 21px; }\n  .toolbar .tool-tip { display: none; }       /* no hover tips on touch */\n  .tool-group-label { font-size: 9px; }\n\n  /* --- RIGHT PANEL → right drawer --- */\n  .right-panel {\n    position: fixed !important; top: 50px; right: 0; bottom: 0;\n    width: min(88vw, 360px) !important; flex-shrink: 0;\n    transform: translateX(110%); transition: transform .26s cubic-bezier(.3,.8,.3,1);\n    z-index: 1250; box-shadow: -14px 0 50px rgba(0,0,0,0);\n  }\n  .right-panel.m-open { transform: translateX(0); box-shadow: -14px 0 50px rgba(0,0,0,.55); }\n  .ptab { padding: 13px 0; font-size: 12px; }\n\n  /* --- CENTER COLUMN takes the whole body (drawers are overlays) --- */\n  .app-body { display: block; position: relative; }\n  .center-col { height: 100%; }\n\n  /* bigger touch targets on panel controls */\n  .prop-input { width: 84px; padding: 8px 9px; font-size: 13px; }\n  .select-sm, .input-sm { padding: 9px 10px; font-size: 13px; }\n  .btn-add { padding: 9px 14px; }\n  .toggle-row input { width: 20px; height: 20px; }\n  .align-btn { padding: 11px 0; }\n  .land-shape-btn { padding: 11px 6px; }\n\n  /* --- CANVAS overlays repositioned to avoid FABs --- */\n  .compass { display: none; }\n  .canvas-hint { display: none; }\n  .scale-indicator { top: 8px; left: 8px; font-size: 10px; padding: 4px 8px; }\n  .zoom-controls { top: 8px; right: 8px; bottom: auto; flex-direction: row; }\n  .zoom-btn { width: 40px; height: 40px; font-size: 19px; }\n  .furn-infobar { top: 56px; }\n\n  /* --- FLOATING ACTION BUTTONS --- */\n  .m-fab {\n    position: fixed; bottom: 64px; z-index: 1100; display: inline-flex;\n    align-items: center; gap: 7px; height: 48px; padding: 0 16px; border-radius: 26px;\n    border: none; color: #fff; font-family: inherit; font-size: 13.5px; font-weight: 800;\n    cursor: pointer; box-shadow: 0 8px 26px rgba(0,0,0,.5);\n  }\n  .m-fab .mf-ic { font-size: 18px; }\n  .m-fab-tools { left: 14px; background: linear-gradient(135deg, var(--accent), var(--accent2)); }\n  .m-fab-panel { right: 14px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); }\n  .m-fab:active { transform: scale(.95); }\n\n  /* --- BACKDROP for drawers + sheet --- */\n  .m-backdrop {\n    position: fixed; inset: 50px 0 0 0; background: rgba(8,9,13,.55);\n    backdrop-filter: blur(2px); z-index: 1200; opacity: 0; pointer-events: none;\n    transition: opacity .24s; display: block;\n  }\n  .m-backdrop.m-open { opacity: 1; pointer-events: auto; }\n\n  /* --- \"⋯\" ACTIONS SHEET (bottom) --- */\n  .m-sheet {\n    position: fixed; left: 0; right: 0; bottom: 0; z-index: 1300; display: block;\n    background: var(--surface); border-top: 1px solid var(--border);\n    border-radius: 18px 18px 0 0; padding: 8px 14px calc(16px + env(safe-area-inset-bottom));\n    transform: translateY(110%); transition: transform .28s cubic-bezier(.3,.85,.3,1);\n    max-height: 80vh; overflow-y: auto; box-shadow: 0 -16px 50px rgba(0,0,0,.5);\n  }\n  .m-sheet.m-open { transform: translateY(0); }\n  .m-sheet-grip { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 6px auto 12px; }\n  .m-sheet-grp-label { font-size: 9.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); padding: 10px 6px 6px; }\n  .m-sheet-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }\n  .m-sheet-btn {\n    display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 12px 4px;\n    border-radius: 12px; border: 1px solid var(--border); background: var(--surface2);\n    color: var(--text); font-family: inherit; font-size: 10.5px; font-weight: 600;\n    cursor: pointer; text-align: center; line-height: 1.2; text-decoration: none;\n  }\n  .m-sheet-btn:active { background: var(--surface); border-color: var(--accent); }\n  .m-sheet-btn .msb-ic { font-size: 21px; }\n  .m-sheet-btn.accent { background: linear-gradient(135deg, rgba(167,139,250,.16), rgba(74,158,255,.1)); border-color: rgba(167,139,250,.4); color: #c4b5fd; }\n\n  /* --- MODAL HEADERS: let crowded button rows wrap --- */\n  .modal-box, .ai-shell { width: 96vw; height: 90vh; max-height: 90vh; }\n  .modal-header { flex-wrap: wrap; gap: 8px; }\n  .modal-header > div { flex-wrap: wrap; }\n  .modal-header .btn-sm { padding: 7px 9px; font-size: 11px; }\n\n  /* 3D hint smaller */\n  #view3d-hint, #dev3d-hint, .walk-hint { font-size: 10px; padding: 6px 10px; white-space: normal; max-width: 90vw; text-align: center; }\n\n  /* --- AI STUDIO: nav becomes horizontal scroller --- */\n  .ai-body { flex-direction: column; }\n  .ai-nav { width: 100%; flex-direction: row; overflow-x: auto; gap: 8px; padding: 10px; border-right: none; border-bottom: 1px solid var(--border); flex-shrink: 0; }\n  .ai-nav-item { flex-direction: column; min-width: 120px; text-align: center; gap: 5px; padding: 10px 8px; }\n  .ai-nav-item .ain-s { display: none; }\n  .ai-foot { display: none; }\n  .ai-content { padding: 16px; }\n  .ai-grid2 { grid-template-columns: 1fr; }\n\n  /* --- RAB fullview head wraps --- */\n  .rab-fv-head { flex-wrap: wrap; gap: 10px; padding: 12px 14px; }\n  .rab-fv-actions { flex-wrap: wrap; }\n  .rab-fv-body, .rab-subtabs { padding-left: 14px; padding-right: 14px; }\n  .rab-subtabs { overflow-x: auto; }\n  .rab-total-value { font-size: 24px; }\n\n  /* --- FLOOR BAR compact --- */\n  .floor-bar { height: 52px; gap: 7px; padding: 0 10px; }\n  .floor-bar-label { display: none; }\n  .floor-bar-actions .floor-act { padding: 8px 9px; font-size: 11px; }\n  .ghost-toggle span { display: none; }\n}\n\n/* very small phones */\n@media (max-width: 420px) {\n  .header-tabs .tab-btn { padding: 7px 10px; font-size: 11px; }\n  .m-sheet-grid { grid-template-columns: repeat(3, 1fr); }\n  .right-panel { width: 92vw !important; }\n}\n\n<\u002Fstyle>\n<style>\n  /* Inline safety net — guarantees fit even if external CSS is cached/stale */\n  html, body { overflow: hidden !important; max-width: 100vw !important; }\n  .app-body { min-width: 0; }\n  .center-col { min-width: 0 !important; }\n  @media (min-width: 861px) {\n    .right-panel { width: clamp(196px, 19vw, 290px) !important; flex-shrink: 0; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- HEADER -->\n<header>\n  <div class=\"logo\">\n    <div class=\"logo-icon\">🏠<\u002Fdiv>\n    Rumah<span>Design<\u002Fspan>3D\n    <span class=\"ver-badge\">2.0<\u002Fspan>\n  <\u002Fdiv>\n\n  <div class=\"header-tabs\">\n    <button class=\"tab-btn active\" id=\"vtab-2d\" onclick=\"setView('2d')\">▦ Denah 2D<\u002Fbutton>\n    <button class=\"tab-btn\" id=\"vtab-3d\" onclick=\"setView('3d')\">🎲 Preview 3D<\u002Fbutton>\n    <button class=\"tab-btn\" id=\"vtab-rab\" onclick=\"setView('rab')\">📋 RAB<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"header-actions\">\n    <button class=\"btn-sm icon-btn\" onclick=\"undo()\" title=\"Undo (Ctrl+Z)\">↩<\u002Fbutton>\n    <button class=\"btn-sm icon-btn\" onclick=\"redo()\" title=\"Redo (Ctrl+Y)\">↪<\u002Fbutton>\n    <div class=\"sep-v\"><\u002Fdiv>\n    <button class=\"btn-sm\" onclick=\"newProject()\" title=\"Mulai proyek baru (kanvas kosong)\">🆕 Baru<\u002Fbutton>\n    <button class=\"btn-sm\" onclick=\"saveProject()\" title=\"Simpan (Ctrl+S)\">💾 Simpan<\u002Fbutton>\n    <button class=\"btn-sm\" onclick=\"saveAndNew()\" title=\"Simpan lalu kosongkan kanvas\">💾 Simpan &amp; Baru<\u002Fbutton>\n    <button class=\"btn-sm\" onclick=\"loadProject()\" title=\"Muat proyek tersimpan\">📂 Muat<\u002Fbutton>\n    <button class=\"btn-sm\" id=\"btnCloud\" onclick=\"openCloudProjects()\" title=\"Proyek tersimpan di cloud\" style=\"display:none;\">☁ Cloud<\u002Fbutton>\n\n    <button class=\"btn-ai\" onclick=\"openAIStudio()\" title=\"AI Powered House Designer\">✨ AI Studio<\u002Fbutton>\n\n    <button class=\"plan-badge\" id=\"planBadge\" onclick=\"openPlanModal()\" title=\"Paket Anda — klik untuk lihat / upgrade\"><\u002Fbutton>\n    <a class=\"btn-sm icon-btn\" href=\"Akun.html\" title=\"Akun saya\" style=\"text-decoration:none; display:inline-flex; align-items:center;\">👤<\u002Fa>\n\n    <div class=\"menu-wrap\">\n      <button class=\"btn-primary\" onclick=\"toggleExportMenu(event)\">📤 Ekspor ▾<\u002Fbutton>\n      <div class=\"dropdown\" id=\"exportMenu\">\n        <div class=\"dropdown-label\">Gambar Denah<\u002Fdiv>\n        <button onclick=\"exportImage('png')\">🖼 Ekspor PNG<\u002Fbutton>\n        <button onclick=\"exportImage('jpg')\">🖼 Ekspor JPG<\u002Fbutton>\n        <button onclick=\"exportPDF()\" data-feat=\"pdf\">📄 Ekspor PDF (Denah + RAB)<\u002Fbutton>\n        <div class=\"dropdown-sep\"><\u002Fdiv>\n        <div class=\"dropdown-label\">Gambar Kerja &amp; CAD<\u002Fdiv>\n        <button onclick=\"openDrawings()\" data-feat=\"drawings\">📐 Gambar Kerja (Denah/Tampak/Potongan)<\u002Fbutton>\n        <button onclick=\"exportDXF()\" data-feat=\"dxf\">📂 Ekspor DXF (AutoCAD/DraftSight)<\u002Fbutton>\n        <div class=\"dropdown-sep\"><\u002Fdiv>\n        <div class=\"dropdown-label\">Data Proyek<\u002Fdiv>\n        <button onclick=\"exportProject()\">📦 Ekspor Proyek (.json)<\u002Fbutton>\n        <button onclick=\"importProject()\">📥 Impor Proyek<\u002Fbutton>\n        <button onclick=\"exportRABExcel()\">📊 RAB ke CSV<\u002Fbutton>\n        <div class=\"dropdown-sep\"><\u002Fdiv>\n        <button class=\"danger\" onclick=\"clearAll()\">🗑 Reset Semua<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"app-body\">\n\n  <!-- LEFT TOOLBAR -->\n  <div class=\"toolbar\">\n    <div class=\"tool-group-label\">EDIT<\u002Fdiv>\n    <button class=\"tool-btn active\" id=\"tool-select\" onclick=\"setTool('select')\">↖<span class=\"tool-tip\">Pilih · V<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-swall\" onclick=\"setTool('swall')\">🧱<span class=\"tool-tip\">Smart Wall · S<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-room\" onclick=\"setTool('room')\">⬛<span class=\"tool-tip\">Ruangan · R<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-wall\" onclick=\"setTool('wall')\">─<span class=\"tool-tip\">Garis Bantu · W<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-door\" onclick=\"setTool('door')\">🚪<span class=\"tool-tip\">Pintu · D<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-window\" onclick=\"setTool('window')\">🪟<span class=\"tool-tip\">Jendela · J<\u002Fspan><\u002Fbutton>\n\n    <div class=\"tool-sep\"><\u002Fdiv>\n    <div class=\"tool-group-label\">SITE<\u002Fdiv>\n    <button class=\"tool-btn\" id=\"tool-land\" data-feat=\"siteplan\" onclick=\"setTool('land')\">⬡<span class=\"tool-tip\">Bentuk Tanah<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-carport\" data-feat=\"siteplan\" onclick=\"setTool('carport')\">🚗<span class=\"tool-tip\">Carport<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-garden\" data-feat=\"siteplan\" onclick=\"setTool('garden')\">🌳<span class=\"tool-tip\">Taman<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-pool\" data-feat=\"siteplan\" onclick=\"setTool('pool')\">💧<span class=\"tool-tip\">Kolam<\u002Fspan><\u002Fbutton>\n\n    <div class=\"tool-sep\"><\u002Fdiv>\n    <div class=\"tool-group-label\">MEP<\u002Fdiv>\n    <button class=\"tool-btn\" id=\"tool-elec\" onclick=\"openMep('elec')\">🔌<span class=\"tool-tip\">Listrik<\u002Fspan><\u002Fbutton>\n    <button class=\"tool-btn\" id=\"tool-plumb\" onclick=\"openMep('plumb')\">🚰<span class=\"tool-tip\">Plumbing<\u002Fspan><\u002Fbutton>\n\n    <div class=\"tool-sep\"><\u002Fdiv>\n    <button class=\"tool-btn\" onclick=\"setView('3d')\">🎲<span class=\"tool-tip\">Lihat 3D<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- CENTER COLUMN -->\n  <div class=\"center-col\">\n    <div class=\"canvas-wrap\" id=\"canvasWrap\">\n      <canvas id=\"floorCanvas\"><\u002Fcanvas>\n\n      <!-- COMPASS -->\n      <div class=\"compass\" id=\"compass\" title=\"Tarik untuk memutar arah utara\">\n        <div class=\"compass-dial\" id=\"compassDial\">\n          <div class=\"compass-needle\"><\u002Fdiv>\n          <span class=\"compass-n\">N<\u002Fspan>\n          <span class=\"compass-e\">E<\u002Fspan>\n          <span class=\"compass-s\">S<\u002Fspan>\n          <span class=\"compass-w\">W<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"compass-deg\" id=\"compassDeg\">0°<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"scale-indicator\" id=\"scaleIndicator\">1px = 5cm · Zoom 100%<\u002Fdiv>\n\n      <div class=\"furn-infobar\" id=\"furnInfobar\">\n        <span id=\"furnInfoName\" class=\"furn-infobar-name\"><\u002Fspan>\n        <button class=\"furn-infobar-btn\" onclick=\"rotateFurn()\">↻ Putar<\u002Fbutton>\n        <button class=\"furn-infobar-btn del\" onclick=\"deleteFurn()\">🗑 Hapus<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"canvas-hint\" id=\"canvasHint\">\n        Pilih tool <b>Ruangan<\u002Fb> lalu klik-drag untuk menggambar\n      <\u002Fdiv>\n\n      <div class=\"zoom-controls\">\n        <button class=\"zoom-btn\" onclick=\"zoom(1.2)\">+<\u002Fbutton>\n        <button class=\"zoom-btn\" onclick=\"zoom(0.8)\">−<\u002Fbutton>\n        <button class=\"zoom-btn\" onclick=\"resetZoom()\" style=\"font-size:13px\" title=\"Pas ke layar\">⊙<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- FLOOR BAR -->\n    <div class=\"floor-bar\">\n      <div class=\"floor-bar-label\">LANTAI<\u002Fdiv>\n      <div class=\"floor-tabs\" id=\"floorTabs\"><\u002Fdiv>\n      <div class=\"floor-bar-actions\">\n        <label class=\"ghost-toggle\" title=\"Tampilkan lantai bawah sebagai bayangan untuk penyelarasan\">\n          <input type=\"checkbox\" id=\"ghostToggle\" onchange=\"render()\"> <span>Bayangan<\u002Fspan>\n        <\u002Flabel>\n        <bu
